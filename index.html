<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WOJAKMETER</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <header>
      <h1>WOJAKMETER</h1>
      <p>The Crypto Emotion Index</p>
    </header>

    <section class="hero">
      <img id="heroWojak" src="assets/wojaks/optimism.svg" class="hero-img" alt="Wojak mood">
      <h2 id="heroMood">Optimism</h2>

      <div class="score">
        Score <span id="heroScore">64</span>/100
      </div>

      <input id="scoreSlider" type="range" min="0" max="100" value="64">
    </section>

    <section class="coins">
      <h3>Top Coins Mood</h3>

      <div class="coin-grid">
        <div class="coin">
          <img src="assets/wojaks/euphoria.svg" alt="BTC mood">
          <p>BTC</p>
        </div>

        <div class="coin">
          <img src="assets/wojaks/content.svg" alt="ETH mood">
          <p>ETH</p>
        </div>

        <div class="coin">
          <img src="assets/wojaks/optimism.svg" alt="SOL mood">
          <p>SOL</p>
        </div>

        <div class="coin">
          <img src="assets/wojaks/neutral.svg" alt="XRP mood">
          <p>XRP</p>
        </div>

        <div class="coin">
          <img src="assets/wojaks/doubt.svg" alt="ADA mood">
          <p>ADA</p>
        </div>

        <div class="coin">
          <img src="assets/wojaks/concern.svg" alt="AVAX mood">
          <p>AVAX</p>
        </div>

        <div class="coin">
          <img src="assets/wojaks/frustration.svg" alt="DOGE mood">
          <p>DOGE</p>
        </div>
      </div>
    </section>

    <section class="drivers">
      <h3>Macro Driver</h3>

      <select id="macroDriver">
        <option value="war">War escalation</option>
        <option value="weather">Extreme weather</option>
        <option value="rates">Interest rate fears</option>
        <option value="regulation">Regulation pressure</option>
        <option value="adoption">Institutional adoption</option>
      </select>
    </section>

    <section class="actions">
      <button id="tweetBtn">Generate Tweet</button>
      <button id="memeBtn">Generate Meme Prompt</button>

      <textarea id="tweetOutput" placeholder="Generated tweet will appear here"></textarea>
      <textarea id="memeOutput" placeholder="Generated meme prompt will appear here"></textarea>
    </section>

    <footer>
      <p>wojakmeter.com</p>
      <p>@WojakMeter</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
